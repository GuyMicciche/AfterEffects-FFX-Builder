# .github/workflows/build.yml
name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --noconfirm --clean "FFX Builder.spec"

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist/* -DestinationPath FFXBuilder-windows.zip
        shell: pwsh

      - name: Zip (Mac/Linux)
        if: matrix.os != 'windows-latest'
        run: zip -r FFXBuilder-${{ matrix.os }}.zip dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFXBuilder-${{ matrix.os }}
          path: "*.zip"