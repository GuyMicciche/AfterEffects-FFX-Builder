name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: mac
          - os: ubuntu-latest
            name: linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --noconfirm --clean "FFX Builder.spec"

      - name: Zip (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "FFX Builder.exe" -DestinationPath "../FFXBuilder-windows.zip"

      - name: Zip (Mac)
        if: matrix.name == 'mac'
        run: |
          cd dist
          zip -r ../FFXBuilder-mac.zip "FFX Builder"

      - name: Zip (Linux)
        if: matrix.name == 'linux'
        run: |
          cd dist
          zip -r ../FFXBuilder-linux.zip "FFX Builder"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFXBuilder-${{ matrix.name }}
          path: FFXBuilder-${{ matrix.name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: FFXBuilder-${{ matrix.name }}.zip